version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: produit-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: produit_db
    ports:
      - "3307:3306"
    volumes:
      - produit_mysql_data:/var/lib/mysql
    networks:
      - produit-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  redis:
    image: redis:7.0
    container_name: produit-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - produit_redis_data:/data
    networks:
      - produit-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  produit-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: produit-service-app
    restart: always
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/produit_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - produit-network
volumes:
  produit_mysql_data:
  produit_redis_data:
networks:
  produit-network:
    driver: bridge
