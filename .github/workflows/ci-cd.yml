name: CI/CD — produit-service
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3
      - name: ☕ Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: 🔨 Maven build
        run: mvn clean package -DskipTests
      - name: 🐳 Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: 🏗️ Build image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/produit-service:latest .
      - name: 🚀 Push image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/produit-service:latest
      - name: 🏷️ Tag SHA
        run: |
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/produit-service:latest \
                     ${{ secrets.DOCKERHUB_USERNAME }}/produit-service:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/produit-service:${{ github.sha }}
